<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ES Module Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #0f0; }
    #output { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>ES Module Test</h1>
  <div id="output">Loading...</div>
  <script type="module">
    document.getElementById('output').textContent = '✅ Module executed!';
    console.log('🚀 Module loaded');
    import('./test-module.js').then(m => {
      document.getElementById('output').textContent += '\n✅ Dynamic import works: ' + m.message;
    }).catch(e => {
      document.getElementById('output').textContent += '\n❌ Dynamic import failed: ' + e.message;
    });
  </script>
</body>
</html>
